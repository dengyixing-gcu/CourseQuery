<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课表智能助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .content { padding: 30px; }
        .info-box {
            background: #f5f7ff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .info-box .icon { font-size: 48px; margin-bottom: 10px; }
        .info-box h3 { color: #667eea; margin-bottom: 10px; }
        .info-box p { color: #666; font-size: 14px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .chat-link {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .status.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .status.error { background: #ffebee; color: #c62828; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 课表智能助手</h1>
            <p>智能查询，便捷高效</p>
        </div>
        <div class="content">
            <div class="info-box">
                <div class="icon">✅</div>
                <h3>课表数据已加载</h3>
                <p id="courseCount">正在加载课程数据...</p>
            </div>
            
            <div id="status" class="status"></div>
            
            <div class="chat-link">
                <a href="/chat" class="btn">💬 开始对话</a>
            </div>
        </div>
    </div>

    <script>
        async function loadCourseCount() {
            try {
                const response = await fetch('/api/schedule');
                const schedule = await response.json();
                document.getElementById('courseCount').textContent = 
                    `已加载 ${schedule.length} 条课程记录，支持自然语言查询`;
            } catch (error) {
                document.getElementById('courseCount').textContent = 
                    '课程数据加载成功，点击开始对话进行查询';
            }
        }
        
        loadCourseCount();
    </script>
</body>
</html>
