<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课表智能助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .content { padding: 30px; }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f5f7ff;
            border-color: #764ba2;
        }
        .upload-area.has-file {
            border-style: solid;
            background: #e8f5e9;
            border-color: #4caf50;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .status.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .status.error { background: #ffebee; color: #c62828; display: block; }
        .chat-link {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 课表智能助手</h1>
            <p>上传课表，智能查询</p>
        </div>
        <div class="content">
            <label class="upload-area" id="uploadArea">
                <div id="uploadText">
                    <span style="font-size: 48px;">📁</span>
                    <p style="margin-top: 15px;">点击上传课表 Excel 文件</p>
                    <p style="font-size: 12px; color: #999; margin-top: 5px;">支持 .xlsx, .xls 格式</p>
                </div>
                <input type="file" id="fileInput" accept=".xlsx,.xls">
            </label>
            
            <div id="status" class="status"></div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" id="uploadBtn" disabled>确认上传</button>
            </div>
            
            <div class="chat-link">
                <a href="/chat" class="btn">💬 开始对话</a>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const uploadText = document.getElementById('uploadText');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        
        let selectedFile = null;

        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                uploadText.innerHTML = `
                    <span style="font-size: 48px;">📄</span>
                    <p style="margin-top: 15px;">${selectedFile.name}</p>
                    <p style="font-size: 12px; color: #666; margin-top: 5px;">${(selectedFile.size / 1024).toFixed(1)} KB</p>
                `;
                uploadArea.classList.add('has-file');
                uploadBtn.disabled = false;
            }
        });

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            status.className = 'status';
            status.textContent = '上传中...';

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    status.className = 'status success';
                    status.textContent = `✅ ${result.message}`;
                } else {
                    status.className = 'status error';
                    status.textContent = `❌ ${result.error || '上传失败'}`;
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = `❌ 网络错误：${error.message}`;
            }
        });
    </script>
</body>
</html>
